<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Arctoon </title>
    <link rel="stylesheet" href="./upload.css">
</head>
<body class="day">
    <!-- Q3 -->
    <div class="container">
        <header>
            ARC<span class="toon">TOON</span>
        </header>
        
        <nav>
            <a href="./index.html"> HOME </a>
            <span class="read"> <a href="./gallery.html"> START READING </a> </span>
            <a href="#"> TRENDING </a>
            <a href="#"> CONTACT </a>
            <a href="./upload.html"> UPLOAD </a>
            <button id="nightBtn"> Night Mode </button>
        </nav>
        
        <main>
            <div class="form">
                <form action="/upload.html" method="get">
                    <!-- Type 1 -->
                    <div class="formGroup">
                        <label for="authorName"> Your Name: </label>
                        <input type="text" id="authorName" name="authorName">
                    </div>

                    <div class="formGroup">
                        <label for="title"> Book Title: </label>
                        <input type="text" id="title" name="title">
                    </div>
                    
                    <!-- Type 2 -->
                    <div class="formGroup">
                        <label for="email"> Your Email: </label>
                        <input type="email" id="email" name="email">
                    </div>
                    
                    <!-- Type 3 -->
                    <div class="formGroup">
                        <label> Publish State: </label>
                        <div class="radio">
                            <input type="radio" id="public" name="publishState" value="public">
                            <label for="public"> Public </label>
                            <br>
                            
                            <input type="radio" id="private" name="publishState" value="private">
                            <label for="private"> Private </label>
                            <br>
                        </div>
                    </div>
                    
                    <!-- Type 4 -->
                    <div class="formGroup"> 
                        <label for="cover"> Book Cover: </label>
                        <input type="file" id="cover" name="cover" accept="image/*">
                    </div>
                         
                    <!-- Type 5 -->
                    <div class="formGroup">
                        <label> Genre: </label>
                        <div class="checkbox">
                            <input type="checkbox" id="genre1" name="genre1" value="fantasy">
                            <label for="genre1"> Fantasy </label>
                            <br>
                            
                            <input type="checkbox" id="genre2" name="genre2" value="horror">
                            <label for="genre2"> Horror </label>
                            <br>
                            
                            <input type="checkbox" id="genre3" name="genre3" value="sci-fi">
                            <label for="genre3"> Sci-Fi </label>
                            <br>
                        </div>
                    </div>

                    <div class="formGroup">
                        <button type="submit" class="submitBtn"> Upload Book </button>
                        <button type="reset" class="resetBtn"> Reset </button>
                    </div>
                </form>
            </div>

            <div class="userUploads">
                <h2> Uploaded by you: </h2>
            </div>
        </main>
        
        <footer> Copyright </footer>
    </div>

    <script type="text/javascript" src="upload.js"></script>
</body>
</html>
